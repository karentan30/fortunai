<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1a14">
<title>善缘 · 我的命盘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jade-deep:   #3d9e82;
  --jade-main:   #5bbfa0;
  --jade-mid:    #8dd9bf;
  --jade-bright: #c8f0e0;
  --gold:        #c9a84c;
  --gold-light:  #e8d08a;
  --gold-deep:   #a07830;
  --ink:         #1a1a18;
  --bg:          #FAFAF8;
  --night:       #0d1a14;
  --night-mid:   #152b1e;
}

html, body {
  min-height: 100%;
  background: var(--night);
  font-family: 'Noto Serif SC', serif;
  color: var(--bg);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
}

/* ── Starfield bg ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 18% 12%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 73% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 41% 27%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 86% 33%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 9% 48%,  rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 62% 55%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 34% 71%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 78%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 94%, rgba(255,255,255,0.45) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── Page header ── */
.page-header {
  width: 100%;
  max-width: 390px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 20px 14px;
  position: relative;
  z-index: 1;
}

.back-btn {
  background: none;
  border: none;
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  color: rgba(201,168,76,0.8);
  letter-spacing: 0.06em;
  cursor: pointer;
  padding: 4px 0;
}

.header-label {
  font-size: 11px;
  letter-spacing: 0.35em;
  color: rgba(201,168,76,0.6);
  font-weight: 300;
}

/* ── Card wrapper ── */
.card-wrap {
  width: 100%;
  max-width: 360px;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

/* ── THE SHARE CARD ── */
.share-card {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  background: var(--night-mid);
  border: 1px solid rgba(201,168,76,0.22);
  box-shadow:
    0 0 0 1px rgba(91,191,160,0.08),
    0 24px 60px rgba(0,0,0,0.6),
    0 8px 20px rgba(0,0,0,0.4);
}

/* Card inner glow */
.share-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(91,191,160,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 100% 100%, rgba(201,168,76,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Gold top border accent */
.share-card::after {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), rgba(232,208,138,0.8), var(--gold), transparent);
}

.card-body {
  position: relative;
  z-index: 1;
  padding: 32px 28px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── Card top logo ── */
.card-logo {
  font-size: 10px;
  letter-spacing: 0.45em;
  color: var(--gold);
  font-weight: 300;
  opacity: 0.7;
  margin-bottom: 22px;
}

/* ── Peace clasp ── */
.card-clasp {
  position: relative;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 33% 26%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 7%, transparent 18%),
    radial-gradient(circle at 70% 68%, var(--jade-deep) 0%, transparent 38%),
    radial-gradient(circle at 20% 72%, rgba(0,180,80,0.22) 0%, transparent 35%),
    radial-gradient(ellipse at 42% 38%, var(--jade-bright) 0%, var(--jade-mid) 22%, var(--jade-main) 52%, var(--jade-deep) 100%);
  box-shadow:
    0 8px 28px rgba(0,102,51,0.5),
    0 2px 8px rgba(0,102,51,0.3),
    inset 0 -4px 12px rgba(0,60,28,0.3);
  margin-bottom: 20px;
  flex-shrink: 0;
  animation: card-breathe 4s ease-in-out infinite;
}

.card-clasp::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--night-mid);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
}

@keyframes card-breathe {
  0%,100% { box-shadow: 0 8px 28px rgba(0,102,51,0.5), 0 2px 8px rgba(0,102,51,0.3), inset 0 -4px 12px rgba(0,60,28,0.3); }
  50% { box-shadow: 0 10px 40px rgba(0,163,80,0.65), 0 3px 14px rgba(0,120,60,0.4), inset 0 -4px 12px rgba(0,60,28,0.3); }
}

/* ── Name + birth ── */
.card-name {
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: #f5f0e8;
  margin-bottom: 6px;
}

.card-birth {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.18em;
  color: rgba(232,208,138,0.65);
  margin-bottom: 24px;
}

/* ── Gold divider ── */
.card-divider {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
}
.card-divider::before, .card-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.35));
}
.card-divider::after {
  background: linear-gradient(90deg, rgba(201,168,76,0.35), transparent);
}
.card-divider span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(201,168,76,0.5);
  white-space: nowrap;
}

/* ── Five element radar ── */
.radar-wrap {
  width: 160px;
  height: 160px;
  margin-bottom: 22px;
  position: relative;
  flex-shrink: 0;
}

.radar-label {
  position: absolute;
  font-size: 10px;
  letter-spacing: 0.06em;
  color: rgba(200,240,224,0.7);
  white-space: nowrap;
}
.radar-label.top    { top: -18px; left: 50%; transform: translateX(-50%); }
.radar-label.tr     { top: 22%; right: -26px; }
.radar-label.br     { bottom: 22%; right: -26px; }
.radar-label.bl     { bottom: 22%; left: -26px; }
.radar-label.tl     { top: 22%; left: -26px; }

/* ── Insight pills ── */
.insights {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 22px;
}

.insight-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.insight-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(91,191,160,0.1);
  border: 1px solid rgba(91,191,160,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  color: var(--jade-mid);
  font-weight: 300;
}

.insight-text {
  flex: 1;
  padding-top: 2px;
}

.insight-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--gold);
  margin-bottom: 3px;
  opacity: 0.75;
}

.insight-value {
  font-size: 12px;
  color: rgba(245,240,232,0.88);
  letter-spacing: 0.05em;
  line-height: 1.5;
}

/* ── Fate score ── */
.fate-score-wrap {
  width: 100%;
  padding: 14px 0;
  border-top: 1px solid rgba(201,168,76,0.12);
  border-bottom: 1px solid rgba(201,168,76,0.12);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.fate-score-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(201,168,76,0.6);
}

.fate-score-bar {
  flex: 1;
  margin: 0 14px;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}

.fate-score-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--jade-main), var(--gold-light));
  width: var(--pct, 78%);
}

.fate-score-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold-light);
  font-weight: 300;
  line-height: 1;
}

.fate-score-unit {
  font-family: 'Noto Serif SC', serif;
  font-size: 9px;
  color: rgba(201,168,76,0.5);
  display: block;
  text-align: right;
  letter-spacing: 0.05em;
}

/* ── Fortune phrase ── */
.fortune-phrase {
  width: 100%;
  text-align: center;
  font-size: 14px;
  letter-spacing: 0.18em;
  color: rgba(245,240,232,0.75);
  line-height: 1.8;
  font-weight: 300;
  margin-bottom: 24px;
  padding: 0 4px;
}

.fortune-phrase em {
  font-style: normal;
  color: var(--jade-mid);
}

/* ── Card footer ── */
.card-footer {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.card-footer-brand {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(201,168,76,0.45);
}

.card-footer-qr {
  width: 32px; height: 32px;
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
}

.qr-dots {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
}

.qr-dots span {
  border-radius: 0.5px;
  background: rgba(201,168,76,0.4);
}

/* ── Action buttons ── */
.actions {
  width: 100%;
  max-width: 360px;
  padding: 22px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  z-index: 1;
}

.btn-share {
  width: 100%;
  padding: 15px 0;
  background: linear-gradient(135deg, var(--gold-deep) 0%, var(--gold) 40%, var(--gold-light) 65%, var(--gold) 100%);
  border: none;
  border-radius: 4px;
  color: rgba(26,26,24,0.95);
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.22em;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(201,168,76,0.35);
}
.btn-share:active { transform: scale(0.97); }

.btn-copy {
  width: 100%;
  padding: 14px 0;
  background: none;
  border: 1px solid rgba(91,191,160,0.35);
  border-radius: 4px;
  color: var(--jade-mid);
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  letter-spacing: 0.18em;
  cursor: pointer;
  transition: all 0.25s;
}
.btn-copy:active { transform: scale(0.97); }

.share-hint {
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-wrap { animation: fadeUp 0.7s 0.1s ease both; }
.actions   { animation: fadeUp 0.7s 0.35s ease both; }
</style>
</head>
<body>

<div class="page-header">
  <button class="back-btn" onclick="history.back()">‹ 返回</button>
  <div class="header-label">命盘结果</div>
  <div style="width:48px"></div>
</div>

<div class="card-wrap">
  <div class="share-card">
    <div class="card-body">

      <div class="card-logo">善缘 · SHENYUAN</div>

      <!-- Peace Clasp -->
      <div class="card-clasp"></div>

      <!-- Name -->
      <div class="card-name" id="cardName">陈雨薇</div>
      <div class="card-birth" id="cardBirth">1994 · 甲戌 · 三月初七</div>

      <!-- Divider -->
      <div class="card-divider"><span>五行命盘</span></div>

      <!-- Pentagon radar -->
      <div class="radar-wrap">
        <div class="radar-label top">木</div>
        <div class="radar-label tr">火</div>
        <div class="radar-label br">土</div>
        <div class="radar-label bl">金</div>
        <div class="radar-label tl">水</div>
        <svg viewBox="-110 -110 220 220" width="160" height="160">
          <defs>
            <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(91,191,160,0.25)"/>
              <stop offset="100%" stop-color="rgba(91,191,160,0.04)"/>
            </radialGradient>
          </defs>
          <!-- Grid lines at 20/40/60/80/100% -->
          <polygon points="0,-19.6 12.5,-4 5.9,8.1 -3.9,5.4 -14.3,-4.6" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <polygon points="0,-39.2 25,-8.1 11.8,16.2 -7.8,10.7 -28.5,-9.3" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <polygon points="0,-58.8 37.5,-12.1 17.6,24.2 -11.7,16.1 -42.8,-13.9" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <polygon points="0,-78.4 50,-16.1 23.5,32.3 -15.6,21.5 -57,-18.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <!-- Full outline -->
          <polygon points="0,-98 62.5,-20.2 29.4,40.4 -19.5,26.9 -71.3,-23.1" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <!-- Axis lines -->
          <line x1="0" y1="0" x2="0" y2="-98" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
          <line x1="0" y1="0" x2="62.5" y2="-20.2" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
          <line x1="0" y1="0" x2="29.4" y2="40.4" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
          <line x1="0" y1="0" x2="-19.5" y2="26.9" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
          <line x1="0" y1="0" x2="-71.3" y2="-23.1" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
          <!-- Data polygon: 木82% 火55% 土42% 金28% 水63% -->
          <polygon
            id="radarData"
            points="0,-80.4 34.4,-11.1 12.4,17.0 -5.5,7.5 -44.9,-14.6"
            fill="url(#rg1)"
            stroke="var(--jade-main)"
            stroke-width="1.5"
            stroke-linejoin="round"/>
          <!-- Vertices -->
          <circle cx="0" cy="-80.4" r="3" fill="var(--jade-main)" opacity="0.85"/>
          <circle cx="34.4" cy="-11.1" r="3" fill="var(--jade-main)" opacity="0.85"/>
          <circle cx="12.4" cy="17" r="3" fill="var(--jade-main)" opacity="0.85"/>
          <circle cx="-5.5" cy="7.5" r="3" fill="var(--jade-main)" opacity="0.85"/>
          <circle cx="-44.9" cy="-14.6" r="3" fill="var(--jade-main)" opacity="0.85"/>
        </svg>
      </div>

      <!-- Divider -->
      <div class="card-divider" style="margin-bottom:18px"><span>天机解读</span></div>

      <!-- Insights -->
      <div class="insights">
        <div class="insight-row">
          <div class="insight-icon">命</div>
          <div class="insight-text">
            <div class="insight-label">主命格局</div>
            <div class="insight-value" id="cardFate">食神生财，聪明灵动，天生具备创业之命</div>
          </div>
        </div>
        <div class="insight-row">
          <div class="insight-icon">运</div>
          <div class="insight-text">
            <div class="insight-label">近年大运</div>
            <div class="insight-value" id="cardLuck">2024–2026 偏财入库，宜大胆出击</div>
          </div>
        </div>
        <div class="insight-row">
          <div class="insight-icon">缘</div>
          <div class="insight-text">
            <div class="insight-label">姻缘提示</div>
            <div class="insight-value" id="cardLove">正缘在异乡，他乡人即是天定之缘</div>
          </div>
        </div>
      </div>

      <!-- Fate score -->
      <div class="fate-score-wrap">
        <div class="fate-score-label">命运能量</div>
        <div class="fate-score-bar">
          <div class="fate-score-fill" style="--pct:82%"></div>
        </div>
        <div>
          <div class="fate-score-num" id="cardScore">82</div>
          <span class="fate-score-unit">/ 100</span>
        </div>
      </div>

      <!-- Fortune phrase -->
      <div class="fortune-phrase" id="cardPhrase">
        "万事皆有时，<em>你的时辰</em>，<br>已在天机之中"
      </div>

      <!-- Card footer -->
      <div class="card-footer">
        <div class="card-footer-brand">shenyuan.app</div>
        <div class="card-footer-qr">
          <div class="qr-dots">
            <span></span><span style="background:transparent"></span><span></span><span></span><span></span>
            <span></span><span style="background:transparent"></span><span></span><span style="background:transparent"></span><span style="background:transparent"></span>
            <span></span><span></span><span></span><span style="background:transparent"></span><span></span>
            <span style="background:transparent"></span><span style="background:transparent"></span><span></span><span></span><span></span>
            <span></span><span></span><span style="background:transparent"></span><span></span><span></span>
          </div>
        </div>
      </div>

    </div><!-- /card-body -->
  </div><!-- /share-card -->
</div><!-- /card-wrap -->

<div class="actions">
  <button class="btn-share" onclick="shareCard()">分享命盘 · 告知好友</button>
  <button class="btn-copy" onclick="copyLink()">复制链接</button>
  <p class="share-hint">长按图片即可保存至相册</p>
</div>

<script>
// Read params from URL (name, birth, fate, luck, love, score, phrase)
(function(){
  var p = new URLSearchParams(location.search);
  var set = function(id, val) { if (val && document.getElementById(id)) document.getElementById(id).textContent = val; };
  set('cardName', p.get('name'));
  set('cardBirth', p.get('birth'));
  set('cardFate', p.get('fate'));
  set('cardLuck', p.get('luck'));
  set('cardLove', p.get('love'));
  set('cardScore', p.get('score'));
  if (p.get('score')) {
    var fill = document.querySelector('.fate-score-fill');
    if (fill) fill.style.setProperty('--pct', p.get('score') + '%');
  }
  if (p.get('phrase') && document.getElementById('cardPhrase')) {
    document.getElementById('cardPhrase').innerHTML = p.get('phrase');
  }
})();

function shareCard() {
  var url = location.href;
  if (navigator.share) {
    navigator.share({ title: '我的善缘命盘', text: '刚算了命盘，八字居然准得可怕…', url: url });
  } else {
    copyLink();
  }
}

function copyLink() {
  var btn = document.querySelector('.btn-copy');
  navigator.clipboard.writeText(location.href).then(function() {
    btn.textContent = '✓ 已复制';
    setTimeout(function(){ btn.textContent = '复制链接'; }, 2000);
  }).catch(function() {
    btn.textContent = '请手动复制地址栏';
    setTimeout(function(){ btn.textContent = '复制链接'; }, 2500);
  });
}
</script>

</body>
</html>
