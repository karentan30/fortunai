<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0f14">
<title>善缘 · 旺运生活局</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f14;--card:#101820;--mid:#161f2a;
  --jade:#5bbfa0;--jade-mid:#8dd9bf;--jade-dark:#3a8f76;
  --gold:#c9a84c;--gold-light:#e8d08a;--gold-deep:#8a6420;
  --amber:#c9820a;
  --text:rgba(220,240,255,0.88);--sub:rgba(180,210,240,0.45);
}
html,body{background:var(--bg);font-family:'Noto Serif SC',serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{max-width:390px;margin:0 auto;min-height:100vh;padding-bottom:120px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 10%,rgba(91,191,160,0.08) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(201,168,76,0.06) 0%,transparent 50%);
  pointer-events:none;z-index:0}

/* ── back btn ── */
.back-btn{position:fixed;top:16px;left:16px;z-index:99;background:none;border:none;font-family:'Noto Serif SC',serif;font-size:13px;color:rgba(91,191,160,0.6);cursor:pointer;padding:4px 0}

/* ── header ── */
.header{position:relative;z-index:1;text-align:center;padding:52px 20px 24px}
.header-title{font-size:22px;font-weight:400;letter-spacing:0.28em;color:var(--text)}
.header-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;letter-spacing:0.22em;color:var(--jade);margin-top:6px;opacity:0.7}
.jade-line{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--jade),transparent);margin:12px auto 0}

/* ── zodiac picker ── */
.section{position:relative;z-index:1;padding:0 16px;margin-bottom:18px}
.sec-label{font-size:10px;letter-spacing:0.22em;color:var(--jade);opacity:0.6;margin-bottom:10px}
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.z-btn{background:var(--card);border:1px solid rgba(91,191,160,0.1);border-radius:8px;padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.2s}
.z-btn:active{transform:scale(0.93)}
.z-btn.active{border-color:var(--jade);background:rgba(91,191,160,0.1);box-shadow:0 0 12px rgba(91,191,160,0.2)}
.z-emoji{font-size:22px;display:block;margin-bottom:3px}
.z-name{font-size:10px;color:var(--sub);letter-spacing:0.1em}
.z-btn.active .z-name{color:var(--jade-mid)}

/* 五行badge */
.element-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:11px;letter-spacing:0.12em;margin:10px 0 0;border:1px solid;opacity:0}
.element-badge.show{opacity:1;animation:fadeUp 0.4s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── cta button ── */
.cta-btn{width:100%;padding:14px 0;background:linear-gradient(135deg,var(--jade-dark),var(--jade),var(--jade-mid));border:none;border-radius:6px;color:#0a1a14;font-family:'Noto Serif SC',serif;font-size:14px;font-weight:500;letter-spacing:0.2em;cursor:pointer;box-shadow:0 4px 20px rgba(91,191,160,0.25);margin-top:4px;transition:opacity 0.2s}
.cta-btn:disabled{opacity:0.4;cursor:not-allowed}

/* ── loading ── */
.loading-wrap{display:none;text-align:center;padding:40px 20px}
.loading-wrap.show{display:block}
.spin-ring{width:48px;height:48px;border:2px solid rgba(91,191,160,0.15);border-top-color:var(--jade);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:11px;color:var(--jade);letter-spacing:0.18em;opacity:0.7}

/* ── results ── */
.results{display:none;position:relative;z-index:1}
.results.show{display:block;animation:fadeUp 0.5s ease}

/* ── category card ── */
.cat-card{margin:0 16px 12px;background:var(--card);border:1px solid rgba(91,191,160,0.1);border-radius:10px;overflow:hidden}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.cat-left{display:flex;align-items:center;gap:10px}
.cat-icon{font-size:20px}
.cat-title{font-size:13px;letter-spacing:0.1em}
.cat-arrow{font-size:12px;color:var(--jade);transition:transform 0.25s}
.cat-card.open .cat-arrow{transform:rotate(180deg)}
.cat-body{display:none;padding:0 16px 14px;border-top:1px solid rgba(91,191,160,0.07)}
.cat-card.open .cat-body{display:block}

/* item rows */
.item-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(91,191,160,0.06)}
.item-row:last-child{border-bottom:none}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--jade);flex-shrink:0;margin-top:5px}
.item-content{}
.item-name{font-size:12px;color:var(--text);margin-bottom:2px;letter-spacing:0.04em}
.item-desc{font-size:10px;color:var(--sub);line-height:1.7;letter-spacing:0.02em}

/* color swatches */
.color-row{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0}
.swatch{display:flex;align-items:center;gap:6px;background:var(--mid);border-radius:6px;padding:7px 10px;border:1px solid rgba(91,191,160,0.08)}
.swatch-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.1)}
.swatch-info{}
.swatch-name{font-size:11px;color:var(--text);letter-spacing:0.06em}
.swatch-use{font-size:9px;color:var(--sub)}

/* shop items */
.shop-row{display:flex;gap:8px;overflow-x:auto;padding:10px 0;scrollbar-width:none}
.shop-row::-webkit-scrollbar{display:none}
.shop-item{flex-shrink:0;width:100px;background:var(--mid);border:1px solid rgba(201,168,76,0.12);border-radius:8px;overflow:hidden;cursor:pointer}
.shop-thumb{width:100%;height:90px;background:linear-gradient(135deg,rgba(91,191,160,0.1),rgba(201,168,76,0.05));display:flex;align-items:center;justify-content:center;font-size:32px}
.shop-info{padding:6px 8px}
.shop-name{font-size:10px;color:var(--text);letter-spacing:0.04em;margin-bottom:2px}
.shop-price{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold)}

/* avatar samples */
.avatar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 0}
.avatar-sample{aspect-ratio:1;border-radius:50%;background:linear-gradient(135deg,rgba(91,191,160,0.15),rgba(201,168,76,0.08));display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid rgba(91,191,160,0.15);cursor:pointer;transition:transform 0.2s}
.avatar-sample:active{transform:scale(0.93)}
.avatar-label{font-size:9px;color:var(--sub);text-align:center;margin-top:4px;letter-spacing:0.04em}
.avatar-wrap{text-align:center}

/* ── sticky bottom ── */
.sticky-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;padding:12px 16px;background:linear-gradient(180deg,transparent 0%,rgba(10,15,20,0.96) 30%,rgba(10,15,20,1) 100%);z-index:90}
.sticky-inner{display:flex;align-items:center;gap:10px}
.sticky-cta{flex:1;padding:13px 0;background:linear-gradient(135deg,var(--gold-deep),var(--gold),var(--gold-light));border:none;border-radius:4px;color:rgba(14,10,4,0.95);font-family:'Noto Serif SC',serif;font-size:13px;font-weight:500;letter-spacing:0.14em;cursor:pointer}

/* ── tip tag ── */
.tip-tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;letter-spacing:0.06em;vertical-align:middle;margin-left:6px}
.tip-tag.lucky{background:rgba(91,191,160,0.15);color:var(--jade-mid);border:1px solid rgba(91,191,160,0.2)}
.tip-tag.warn{background:rgba(201,130,10,0.12);color:var(--amber);border:1px solid rgba(201,130,10,0.2)}
</style>
</head>
<body>

<button class="back-btn" onclick="history.back()">← 返回</button>

<div class="header">
  <div class="header-title">旺运生活局</div>
  <div class="header-sub">五行相生 · 万物皆可旺</div>
  <div class="jade-line"></div>
</div>

<!-- 选生肖 -->
<div class="section">
  <div class="sec-label">选择您的生肖</div>
  <div class="zodiac-grid" id="zodiacGrid">

    <div class="z-btn" data-z="rabbit" onclick="selectZ(this)"><span class="z-emoji">🐰</span><span class="z-name">兔</span></div>
    <div class="z-btn" data-z="dragon" onclick="selectZ(this)"><span class="z-emoji">🐲</span><span class="z-name">龙</span></div>
    <div class="z-btn" data-z="snake"  onclick="selectZ(this)"><span class="z-emoji">🐍</span><span class="z-name">蛇</span></div>
    <div class="z-btn" data-z="horse"  onclick="selectZ(this)"><span class="z-emoji">🐴</span><span class="z-name">马</span></div>
    <div class="z-btn" data-z="goat"   onclick="selectZ(this)"><span class="z-emoji">🐑</span><span class="z-name">羊</span></div>
    <div class="z-btn" data-z="monkey" onclick="selectZ(this)"><span class="z-emoji">🐵</span><span class="z-name">猴</span></div>
    <div class="z-btn" data-z="rooster"onclick="selectZ(this)"><span class="z-emoji">🐓</span><span class="z-name">鸡</span></div>
    <div class="z-btn" data-z="dog"    onclick="selectZ(this)"><span class="z-emoji">🐶</span><span class="z-name">狗</span></div>

</div>

<div class="section">
  <button class="cta-btn" id="genBtn" onclick="generate()" disabled>选择生肖后查看旺运局 →</button>
</div>

<div class="loading-wrap" id="loadingWrap">
  <div class="spin-ring"></div>
  <div class="loading-txt">正在推算五行旺运局…</div>
</div>

<div class="results" id="results">

  <!-- 旺运植物 -->
  <div class="cat-card" onclick="toggleCat(this)">

      <div class="cat-left"><span class="cat-icon">🌿</span><span class="cat-title">旺运植物</span></div>

      <div class="cat-left"><span class="cat-icon">👗</span><span class="cat-title">穿衣旺运色</span></div>
      <span class="cat-arrow">▾</span>
    </div>
    <div class="cat-body" id="cloth-body"></div>
  </div>

  <!-- 床单被罩 -->
  <div class="cat-card" onclick="toggleCat(this)">
    <div class="cat-header">
      <div class="cat-left"><span class="cat-icon">🛏️</span><span class="cat-title">床品 · 卧室色</span></div>
      <span class="cat-arrow">▾</span>
    </div>
    <div class="cat-body" id="bed-body"></div>
  </div>

  <!-- 鞋子 -->
  <div class="cat-card" onclick="toggleCat(this)">
    <div class="cat-header">
      <div class="cat-left"><span class="cat-icon">👟</span><span class="cat-title">旺运鞋色</span></div>
      <span class="cat-arrow">▾</span>
    </div>
    <div class="cat-body" id="shoes-body"></div>
  </div>

  <!-- 家具木材 -->
  <div class="cat-card" onclick="toggleCat(this)">
    <div class="cat-header">
      <div class="cat-left"><span class="cat-icon">🪑</span><span class="cat-title">家具 · 木材色</span></div>
      <span class="cat-arrow">▾</span>
    </div>
    <div class="cat-body" id="furniture-body"></div>
  </div>

  <!-- 旺运头像 -->
  <div class="cat-card" onclick="toggleCat(this)">
    <div class="cat-header">
      <div class="cat-left"><span class="cat-icon">🖼️</span><span class="cat-title">旺运头像推荐</span></div>
      <span class="cat-arrow">▾</span>
    </div>
    <div class="cat-body" id="avatar-body"></div>
  </div>

  <!-- 风景挂画 -->
  <div class="cat-card" onclick="toggleCat(this)">
    <div class="cat-header">
      <div class="cat-left"><span class="cat-icon">🏔️</span><span class="cat-title">旺运风景挂画</span></div>
      <span class="cat-arrow">▾</span>
    </div>
    <div class="cat-body" id="painting-body"></div>
  </div>

  <!-- 挂饰摆件项链 -->
  <div class="cat-card" onclick="toggleCat(this)">
    <div class="cat-header">
      <div class="cat-left"><span class="cat-icon">💎</span><span class="cat-title">旺运挂饰 · 摆件 · 项链</span></div>
      <span class="cat-arrow">▾</span>
    </div>
    <div class="cat-body" id="jewelry-body"></div>

</div>

<!-- sticky -->
<div class="sticky-bar" id="stickyBar" style="display:none">
  <div class="sticky-inner">
    <button class="sticky-cta" onclick="window.location.href='bazi.html'">结合八字精算完整旺运局 · $9.9</button>
  </div>
</div>

let curZ = null, curElem = null;

function selectZ(el){
  document.querySelectorAll('.z-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  curZ = el.dataset.z;
  curElem = ELEM[curZ];
  const ec = ELEM_COLOR[curElem];
  const badge = document.getElementById('elemBadge');
  badge.style.background = ec.bg;
  badge.style.borderColor = ec.border;
  badge.style.color = ec.text;
  badge.textContent = `${ELEM_EMOJI[curElem]} 五行属${curElem}`;
  badge.classList.remove('show');
  void badge.offsetWidth;
  badge.classList.add('show');
  document.getElementById('genBtn').disabled = false;
  document.getElementById('genBtn').textContent = `查看${curElem}命旺运生活局 →`;
}

function generate(){
  if(!curElem) return;
  document.getElementById('genBtn').style.display = 'none';
  document.getElementById('loadingWrap').classList.add('show');
  setTimeout(()=>{
    document.getElementById('loadingWrap').classList.remove('show');
    fillResults();
    document.getElementById('results').classList.add('show');
    document.getElementById('stickyBar').style.display = 'block';
    document.getElementById('genBtn').style.display = 'block';
    document.getElementById('genBtn').textContent = '重新选择生肖';
    document.getElementById('genBtn').onclick = ()=>{location.reload()};
  }, 1800);
}

          <div style="font-size:9px;color:var(--jade);margin-top:4px;border:1px solid rgba(91,191,160,0.2);padding:3px 8px;border-radius:10px;display:inline-block">即将开放</div>
        </div>
      </div>
    </div>`;

  // painting
  const pa = d.painting;
  document.getElementById('painting-body').innerHTML = `
    <div class="item-row"><div class="item-dot" style="background:var(--gold)"></div><div class="item-content">
      <div class="item-name">${pa.name} <span class="tip-tag lucky">挂${pa.dir}</span></div>
      <div class="item-desc">${pa.desc}</div>
    </div></div>
    <div class="shop-row">
      <div class="shop-item" onclick="window.location.href='shop.html'">
        <div class="shop-thumb">🏔️</div>
        <div class="shop-info"><div class="shop-name">${pa.name}·定制</div><div class="shop-price">$38</div></div>
      </div>
      <div class="shop-item" onclick="window.location.href='shop.html'">
        <div class="shop-thumb">🎨</div>
        <div class="shop-info"><div class="shop-name">AI风水画·个性定制</div><div class="shop-price">$58</div></div>
      </div>
    </div>`;

  // jewelry
  const je = d.jewelry;
  document.getElementById('jewelry-body').innerHTML =
    je.map(j=>`<div class="item-row"><div class="item-dot" style="background:var(--gold)"></div><div class="item-content" style="flex:1;display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div><div class="item-name">${j.name}</div><div class="item-desc">${j.desc}</div></div>
      <div onclick="window.location.href='shop.html'" style="flex-shrink:0;padding:5px 10px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:4px;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);cursor:pointer;white-space:nowrap">${j.price}</div>
    </div></div>`).join('');

  // open first card
  document.querySelector('.cat-card').classList.add('open');
}

function toggleCat(card){
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
}
</script>
</body>
</html>
