<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#FAFAF8">
<title>善缘 · 珍品 | 翡翠水晶</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jade-deep:    #3d9e82;
  --jade-main:    #5bbfa0;
  --jade-mid:     #8dd9bf;
  --jade-bright:  #c8f0e0;
  --jade-glow:    rgba(141,217,191,0.35);
  --gold:         #c9a84c;
  --gold-light:   #e8d08a;
  --ink:          #1a1a18;
  --ink-mid:      #4a4a46;
  --ink-light:    #8a8a84;
  --bg:           #FAFAF8;
  --bg-card:      #FFFFFF;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Noto Serif SC', serif;
  color: var(--ink);
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 0;
  overflow-y: auto;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}

@keyframes jade-breathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.025); }
}

/* ── Header ── */
.header {
  width: 100%;
  text-align: center;
  padding: 36px 28px 24px;
}

.header .logo {
  font-size: 13px;
  letter-spacing: 0.38em;
  color: var(--gold);
  font-weight: 300;
  margin-bottom: 14px;
}

.gold-line {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto;
}
.gold-line.wide { width: 120px; }

.subhead {
  margin-top: 10px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-align: center;
}

/* ── Section Header ── */
.section-head {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  margin-bottom: 16px;
}
.section-head span { font-size: 12px; letter-spacing: 0.18em; color: var(--gold); white-space: nowrap; }
.section-head::before, .section-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4));
}
.section-head::after {
  background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
}

/* ── Product Grid ── */
.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 20px;
  width: 100%;
  max-width: 390px;
}

.product-card {
  background: var(--bg-card);
  border: 1px solid #eeeee8;
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.product-card:active {
  transform: scale(0.98);
}

.product-img {
  width: 100%;
  aspect-ratio: 1 / 1;
  background:
    radial-gradient(circle at 34% 27%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.3) 7%, transparent 20%),
    radial-gradient(circle at 70% 68%, var(--jade-deep) 0%, transparent 38%),
    radial-gradient(circle at 20% 72%, rgba(0,180,80,0.2) 0%, transparent 35%),
    radial-gradient(ellipse at 42% 38%, var(--jade-bright) 0%, var(--jade-mid) 22%, var(--jade-main) 52%, var(--jade-deep) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: jade-breathe 5s ease-in-out infinite;
}

.product-img .jade-glyph {
  font-family: 'Noto Serif SC', serif;
  font-size: 38px;
  font-weight: 300;
  color: rgba(255,255,255,0.88);
  text-shadow: 0 2px 16px rgba(0,0,0,0.18), 0 0 24px rgba(255,255,255,0.4);
  letter-spacing: 0;
  line-height: 1;
  user-select: none;
}

.product-info {
  padding: 12px 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.product-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.08em;
  line-height: 1.4;
}

.product-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.02em;
}

.product-price .unit {
  font-size: 11px;
  font-family: 'Noto Serif SC', serif;
  margin-right: 2px;
}

.btn-inquire {
  width: 100%;
  padding: 8px 0;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border: none;
  border-radius: 3px;
  color: #fff;
  font-family: 'Noto Serif SC', serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  cursor: pointer;
  transition: all 0.25s;
  margin-top: 4px;
}
.btn-inquire:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(201,168,76,0.35);
}
.btn-inquire:active { transform: scale(0.97); }

/* ── Footer ── */
.footer {
  width: 100%;
  text-align: center;
  padding: 36px 28px 28px;
}

.footer .gold-line { margin-bottom: 16px; }

.footer-text {
  font-size: 12px;
  color: var(--ink-light);
  letter-spacing: 0.12em;
  line-height: 1.6;
  font-style: italic;
}
</style>
</head>
<body>

<button onclick="history.back()" style="position:fixed;top:16px;left:16px;z-index:99;background:none;border:none;font-family:'Noto Serif SC',serif;font-size:13px;color:var(--gold);letter-spacing:0.08em;cursor:pointer;padding:4px 8px">← 返回</button>

<div class="header">
  <div class="logo">善缘 · 珍品</div>
  <div class="gold-line" style="opacity:1"></div>
  <div class="subhead">JADE & CRYSTAL · AUSPICIOUS TREASURES</div>
</div>

<div class="section-head"><span>缘起好物</span></div>

<div class="product-grid">

  <div class="product-card">
    <div class="product-img">
      <div class="jade-glyph">玉</div>
    </div>
    <div class="product-info">
      <div class="product-name">高冰种平安扣</div>
      <div class="product-price"><span class="unit">¥</span>2,880</div>
      <div style="font-size:9px;color:var(--ink-light);letter-spacing:0.05em;margin-top:2px">已售 312 件</div>
      <button class="btn-inquire" onclick="amazonGo('jade peace clasp pendant necklace')">问缘</button>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img" style="background:
      radial-gradient(circle at 30% 28%, rgba(255,255,255,0.88) 0%, rgba(255,255,255,0.3) 6%, transparent 18%),
      radial-gradient(circle at 68% 65%, #6a3f8c 0%, transparent 40%),
      radial-gradient(circle at 22% 70%, rgba(180,100,220,0.25) 0%, transparent 35%),
      radial-gradient(ellipse at 42% 38%, #d4b0e8 0%, #9b6fc4 24%, #7a4fa8 52%, #4a2970 100%);">
      <div class="jade-glyph">晶</div>
    </div>
    <div class="product-info">
      <div class="product-name">紫水晶手链</div>
      <div class="product-price"><span class="unit">¥</span>680</div>
      <div style="font-size:9px;color:var(--ink-light);letter-spacing:0.05em;margin-top:2px">已售 1,847 件</div>
      <button class="btn-inquire" onclick="amazonGo('amethyst crystal bracelet healing')">问缘</button>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img" style="background:
      radial-gradient(circle at 34% 27%, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0.25) 8%, transparent 20%),
      radial-gradient(circle at 68% 65%, #1a1a18 0%, transparent 42%),
      radial-gradient(circle at 24% 70%, rgba(50,50,50,0.3) 0%, transparent 35%),
      radial-gradient(ellipse at 42% 38%, #5a5a56 0%, #3a3a36 24%, #2a2a28 52%, #0a0a08 100%);">
      <div class="jade-glyph" style="color:rgba(255,255,255,0.75)">貔</div>
    </div>
    <div class="product-info">
      <div class="product-name">墨翠貔貅</div>
      <div class="product-price"><span class="unit">¥</span>1,580</div>
      <div style="font-size:9px;color:var(--ink-light);letter-spacing:0.05em;margin-top:2px">已售 89 件</div>
      <button class="btn-inquire" onclick="amazonGo('black jade pixiu bracelet wealth')">问缘</button>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img" style="background:
      radial-gradient(circle at 34% 27%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.35) 6%, transparent 18%),
      radial-gradient(circle at 68% 65%, #b8944a 0%, transparent 40%),
      radial-gradient(circle at 22% 70%, rgba(220,180,80,0.2) 0%, transparent 35%),
      radial-gradient(ellipse at 42% 38%, #f5e6c8 0%, #e8d09a 24%, #d4b87a 52%, #b8944a 100%);">
      <div class="jade-glyph" style="color:rgba(180,140,50,0.9)">意</div>
    </div>
    <div class="product-info">
      <div class="product-name">白玉如意</div>
      <div class="product-price"><span class="unit">¥</span>980</div>
      <div style="font-size:9px;color:var(--ink-light);letter-spacing:0.05em;margin-top:2px">已售 567 件</div>
      <button class="btn-inquire" onclick="amazonGo('white jade ruyi pendant necklace')">问缘</button>
    </div>
  </div>

</div>

<div class="footer">
  <div class="gold-line"></div>
  <p class="footer-text">每件皆有缘起，遇见即是注定</p>
</div>

<script>
var AMZ_TAG='fabulousslim-20';
function amazonGo(q){window.open('https://www.amazon.com/s?k='+encodeURIComponent(q)+'&tag='+AMZ_TAG,'_blank','noopener');}
</script>
</body>
</html>
