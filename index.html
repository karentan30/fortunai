<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#FAFAF8">
<title>善缘 ShenYuan · 首页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jade-deep:    #3d9e82;
  --jade-main:    #5bbfa0;
  --jade-mid:     #8dd9bf;
  --jade-bright:  #c8f0e0;
  --jade-glow:    rgba(141,217,191,0.35);
  --gold:         #c9a84c;
  --gold-light:   #e8d08a;
  --ink:          #1a1a18;
  --ink-mid:      #4a4a46;
  --ink-light:    #8a8a84;
  --bg:           #FAFAF8;
  --bg-card:      #FFFFFF;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Noto Serif SC', serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ── Page ── */
.page {
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 24px 48px;
  background: var(--bg);
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes jade-breathe {
  0%,100% {
    box-shadow: 0 10px 40px rgba(0,102,51,0.38), 0 3px 12px rgba(0,102,51,0.22), inset 0 -6px 18px rgba(0,60,28,0.28);
    transform: scale(1);
  }
  50% {
    box-shadow: 0 14px 60px rgba(0,163,80,0.52), 0 5px 20px rgba(0,120,60,0.3), inset 0 -6px 18px rgba(0,60,28,0.28);
    transform: scale(1.025);
  }
}
@keyframes card-in {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Fade-in staggered ── */
.fade-el {
  opacity: 0;
  animation: fadeUp 0.8s ease forwards;
}
.fade-el.f1 { animation-delay: 0s; }
.fade-el.f2 { animation-delay: 0.15s; }
.fade-el.f3 { animation-delay: 0.3s; }
.fade-el.f4 { animation-delay: 0.45s; }
.fade-el.f5 { animation-delay: 0.6s; }
.fade-el.f6 { animation-delay: 0.75s; }

/* ── Logo ── */
.logo {
  font-size: 13px;
  letter-spacing: 0.38em;
  color: var(--gold);
  font-weight: 300;
  margin-bottom: 18px;
}

/* ── Peace Clasp (平安扣) ── */
.peace-clasp {
  position: relative;
  border-radius: 50%;
  flex-shrink: 0;
  background:
    radial-gradient(circle at 34% 27%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.35) 7%, transparent 18%),
    radial-gradient(circle at 70% 68%, var(--jade-deep) 0%, transparent 38%),
    radial-gradient(circle at 20% 72%, rgba(0,180,80,0.25) 0%, transparent 35%),
    radial-gradient(ellipse at 42% 38%, var(--jade-bright) 0%, var(--jade-mid) 22%, var(--jade-main) 52%, var(--jade-deep) 100%);
  box-shadow:
    0 10px 40px rgba(0,102,51,0.38),
    0 3px 12px rgba(0,102,51,0.22),
    inset 0 -6px 18px rgba(0,60,28,0.28),
    inset 0 2px 6px rgba(180,255,210,0.12);
}
.peace-clasp::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: var(--bg);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.12), inset 0 -1px 4px rgba(0,80,30,0.08);
}
.peace-clasp.lg { width: 160px; height: 160px; }
.peace-clasp.lg::after { width: 46px; height: 46px; }

.peace-clasp-wrap {
  animation: jade-breathe 4s ease-in-out infinite;
  margin-bottom: 22px;
}

/* ── Tagline ── */
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--ink);
  letter-spacing: 0.16em;
  text-align: center;
  margin-bottom: 6px;
}
.tagline-sub {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: var(--ink-light);
  text-align: center;
  margin-bottom: 24px;
}

/* ── Gold Line ── */
.gold-line {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 32px;
}

/* ── Card Grid ── */
.card-grid {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 40px;
}

.menu-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 28px 12px 24px;
  border-radius: 12px;
  border: 1px solid rgba(201,168,76,0.25);
  cursor: pointer;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  /* lighter jade gradient similar to peace clasp */
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.85) 0%, rgba(200,240,224,0.25) 15%, transparent 50%),
    radial-gradient(circle at 75% 70%, rgba(61,158,130,0.10) 0%, transparent 45%),
    linear-gradient(135deg, rgba(200,240,224,0.40) 0%, rgba(141,217,191,0.25) 40%, rgba(255,255,255,0.6) 100%);
  box-shadow: 0 2px 12px rgba(0,60,28,0.06);
}
.menu-card:active {
  transform: scale(0.96);
}
.menu-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 24px rgba(0,102,51,0.12), 0 0 0 1px rgba(201,168,76,0.35);
}

.menu-card .card-glyph {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--jade-main);
  line-height: 1;
  letter-spacing: 0;
  text-shadow: 0 0 20px var(--jade-glow);
}
.menu-card .card-zh {
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--ink);
}
.menu-card .card-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-style: italic;
  letter-spacing: 0.08em;
  color: var(--ink-light);
}

/* Stagger card animations */
.menu-card:nth-child(1) { animation: card-in 0.6s 0.5s ease both; }
.menu-card:nth-child(2) { animation: card-in 0.6s 0.65s ease both; }
.menu-card:nth-child(3) { animation: card-in 0.6s 0.8s ease both; }
.menu-card:nth-child(4) { animation: card-in 0.6s 0.95s ease both; }

/* ── Bottom text ── */
.bottom-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-align: center;
}
</style>
</head>
<body>

<div class="page">

  <!-- Logo -->
  <div class="logo fade-el f1">善缘 · SHENYUAN</div>

  <!-- Peace Clasp -->
  <div class="peace-clasp-wrap fade-el f2">
    <div class="peace-clasp lg"></div>
  </div>

  <!-- Tagline -->
  <p class="tagline fade-el f3">你求什么，自有天机</p>
  <p class="tagline-sub fade-el f3">ASK, AND HEAVEN SHALL ANSWER</p>

  <!-- Gold Line -->
  <div class="gold-line fade-el f4"></div>

  <!-- Menu Cards -->
  <div class="card-grid">
    <a class="menu-card" href="../shenyuan_h5_v13.html">
      <div class="card-glyph">命</div>
      <div class="card-zh">命盘解读</div>
      <div class="card-en">Fortune Reading</div>
    </a>
    <a class="menu-card" href="pages/shop.html">
      <div class="card-glyph">玉</div>
      <div class="card-zh">翡翠珍品</div>
      <div class="card-en">Jade Shop</div>
    </a>
    <a class="menu-card" href="pages/daoshao.html">
      <div class="card-glyph">祈</div>
      <div class="card-zh">代烧祈福</div>
      <div class="card-en">Ritual Booking</div>
    </a>
    <a class="menu-card" href="pages/master.html">
      <div class="card-glyph">缘</div>
      <div class="card-zh">大师咨询</div>
      <div class="card-en">Master Reading</div>
    </a>
  </div>

  <!-- Bottom -->
  <p class="bottom-text fade-el f5">每一次相遇，皆有因缘</p>

</div>

</body>
</html>
